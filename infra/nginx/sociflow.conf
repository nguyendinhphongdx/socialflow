# =============================================================================
# /etc/nginx/conf.d/sociflow.conf — virtual hosts
# Substitute ${DOMAIN} when copying; nginx-alpine doesn't expand env in configs,
# so set DOMAIN by sed-replacing during deploy OR keep as plain sociflow.io.
# This file uses placeholders that should be replaced by infra/scripts/init-cert.sh.
# =============================================================================

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sociflow_api {
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream sociflow_ai {
    server ai:3001 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream sociflow_web {
    server web:3020 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream sociflow_grafana {
    server grafana:3000;
    keepalive 8;
}

# -----------------------------------------------------------------------------
# Internal status for nginx-exporter
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    location = /stub_status {
        stub_status;
        allow 172.16.0.0/12;       # docker bridge
        allow 127.0.0.1;
        deny all;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # ACME HTTP-01 challenge (Let's Encrypt webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — main app
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name DOMAIN_PLACEHOLDER;

    # SSL --------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers -------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Connection limits
    limit_conn conn_zone 50;

    # Block exposure of internal API (api ↔ ai only via docker network) ------
    location ^~ /internal/ {
        deny all;
        return 403;
    }

    # ACME (mostly handled by HTTP server above, kept for safety)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # ---------- API ---------------------------------------------------------
    location /api/ {
        limit_req zone=api_zone burst=60 nodelay;
        proxy_pass http://sociflow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Tighter rate limit on auth endpoints
    location /api/v1/auth/ {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://sociflow_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ---------- WebSocket (Socket.IO) ---------------------------------------
    location /socket.io/ {
        proxy_pass http://sociflow_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Grafana (basic auth in front) -------------------------------
    location /grafana/ {
        auth_basic "Sociflow Ops";
        auth_basic_user_file /etc/nginx/htpasswd;

        proxy_pass http://sociflow_grafana/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana live (websocket)
    location /grafana/api/live/ {
        auth_basic "Sociflow Ops";
        auth_basic_user_file /etc/nginx/htpasswd;

        proxy_pass http://sociflow_grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # ---------- Web (Next.js) — root catch-all ------------------------------
    location / {
        proxy_pass http://sociflow_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Static asset cache hint (Next.js fingerprinted bundles)
    location /_next/static/ {
        proxy_pass http://sociflow_web;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
