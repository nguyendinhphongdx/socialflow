# =============================================================================
# /etc/nginx/nginx.conf — main config
# =============================================================================
user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    client_max_body_size 200M;        # video uploads up to 200MB
    client_body_timeout 120s;
    client_header_timeout 60s;
    send_timeout 120s;

    # Gzip --------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        application/wasm
        image/svg+xml
        font/ttf
        font/otf;

    # Rate-limit zones (auth + api separated) ---------------------------------
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # Real IP from Cloudflare / proxy in front (optional)
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    include /etc/nginx/conf.d/*.conf;
}
