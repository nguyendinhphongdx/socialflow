# =============================================================================
# Prometheus scrape config.
# Mounted at /etc/prometheus/prometheus.yml in the `prometheus` service.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: sociflow-prod

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # NOTE: apps/api and apps/ai currently do NOT expose /metrics.
  # Agent F2 must wire `prom-client` + GET /metrics endpoint before these
  # scrapes return data. Until then the target is `down` and that's expected.
  - job_name: sociflow-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: api

  - job_name: sociflow-ai
    metrics_path: /metrics
    static_configs:
      - targets: ["ai:3001"]
        labels:
          service: ai

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
