version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns: ["@nestjs/*"]
      prisma:
        patterns: ["@prisma/*", "prisma"]
      typescript:
        patterns: ["typescript", "tsx", "@types/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
