name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  lint-and-typecheck:
    name: Lint + Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client (needed for type-check)
        run: pnpm --filter @sociflow/prisma generate

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sociflow
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: sociflow_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sociflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://sociflow:dev@localhost:5432/sociflow_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-min-32-chars-padding
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-padding
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      INTERNAL_TOKEN: test-internal-token-32-chars-padding
      CORS_ORIGINS: http://localhost:3020
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_FROM: test@sociflow.local
      STORAGE_TYPE: s3
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: sociflow-test
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_PUBLIC_URL: http://localhost:9000/sociflow-test
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3020

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sociflow/prisma generate

      - name: Migrate test DB
        run: pnpm --filter @sociflow/prisma migrate:deploy

      - name: Test
        run: pnpm test

  build:
    name: Build all apps
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sociflow/prisma generate

      - name: Build all
        run: pnpm build
