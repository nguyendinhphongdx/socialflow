services:
  postgres:
    image: postgres:16-alpine
    container_name: sociflow-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sociflow
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: sociflow_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sociflow -d sociflow_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sociflow-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: sociflow-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"       # SMTP
      - "8025:8025"       # Web UI — http://localhost:8025

  minio:
    image: minio/minio:latest
    container_name: sociflow-minio
    restart: unless-stopped
    ports:
      - "9000:9000"       # S3 API
      - "9001:9001"       # Console — http://localhost:9001
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: tạo bucket sociflow-dev nếu chưa có
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      (mc ls local/sociflow-dev || mc mb local/sociflow-dev) &&
      mc anonymous set download local/sociflow-dev
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
