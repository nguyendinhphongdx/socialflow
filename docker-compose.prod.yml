# =============================================================================
# Sociflow production stack
# Usage:
#   cp .env.production.example .env.production && edit
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# =============================================================================

name: sociflow-prod

networks:
  sociflow-prod:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  certbot_conf:
  certbot_www:

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ---------------------------------------------------------------------------
  # Datastores — internal-only (no published ports)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sociflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sociflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sociflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sociflow-prod
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sociflow} -d ${POSTGRES_DB:-sociflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: sociflow-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
    volumes:
      - redis_data:/data
    networks:
      - sociflow-prod
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  api:
    image: sociflow-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: sociflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-sociflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sociflow}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - sociflow-prod
    expose:
      - "3000"
    logging: *default-logging

  ai:
    image: sociflow-ai:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/ai/Dockerfile.prod
    container_name: sociflow-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-sociflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sociflow}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - sociflow-prod
    expose:
      - "3001"
    logging: *default-logging

  web:
    image: sociflow-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_SESSION_COOKIE: ${NEXT_PUBLIC_SESSION_COOKIE:-sf_access}
    container_name: sociflow-web
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3020"
    networks:
      - sociflow-prod
    expose:
      - "3020"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Edge: nginx + certbot
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: sociflow-nginx
    restart: unless-stopped
    depends_on:
      - api
      - ai
      - web
      - grafana
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/sociflow.conf:/etc/nginx/conf.d/sociflow.conf:ro
      - ./infra/nginx/htpasswd:/etc/nginx/htpasswd:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - sociflow-prod
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    container_name: sociflow-certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run cert renewal every 12h; nginx reload via shared volume
    entrypoint: >
      sh -c "trap exit TERM;
      while :;
      do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!};
      done"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: sociflow-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    networks:
      - sociflow-prod
    expose:
      - "9090"
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    container_name: sociflow-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - sociflow-prod
    expose:
      - "3000"
    logging: *default-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sociflow-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-sociflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sociflow}?sslmode=disable
    networks:
      - sociflow-prod
    expose:
      - "9187"
    logging: *default-logging

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: sociflow-redis-exporter
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - sociflow-prod
    expose:
      - "9121"
    logging: *default-logging

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: sociflow-nginx-exporter
    restart: unless-stopped
    depends_on:
      - nginx
    command:
      - --nginx.scrape-uri=http://nginx:80/stub_status
    networks:
      - sociflow-prod
    expose:
      - "9113"
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Backup (sidecar; cron driven from host crontab — see infra/README.md)
  # ---------------------------------------------------------------------------
  backup:
    image: postgres:16-alpine
    container_name: sociflow-backup
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-sociflow}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-sociflow}
    volumes:
      - ./infra/scripts:/scripts:ro
    networks:
      - sociflow-prod
    profiles:
      - backup
    # Invoked on-demand: docker compose -f docker-compose.prod.yml run --rm backup /scripts/backup-postgres.sh
    entrypoint: ["/bin/sh"]
    command: ["-c", "echo 'backup container ready; invoke /scripts/backup-postgres.sh via run --rm'"]
    logging: *default-logging
